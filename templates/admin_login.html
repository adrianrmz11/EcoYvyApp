<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EcoYvy — Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/custom.css"/>
</head>
<body class="d-flex flex-column align-items-center justify-content-center min-vh-100 bg-light">

  <div class="card shadow-sm border-0 p-4 p-sm-5" style="width:min(400px,92vw); border-radius:20px">

    <div class="text-center mb-4">
      <a href="/" class="text-decoration-none">
        <span class="fw-bold fs-5 text-eco">🌿 EcoYvy</span>
      </a>
      <h5 class="fw-bold mt-3 mb-1">Admin Access</h5>
      <p class="text-muted small mb-0">Panel de administración</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 text-center small rounded-3" role="alert">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/admin/login">
      <div class="mb-3">
        <label class="form-label small fw-semibold text-muted text-uppercase" style="letter-spacing:.04em">
          Usuario
        </label>
        <input type="text" name="username" class="form-control rounded-3"
               placeholder="admin" autocomplete="username" required/>
      </div>
      <div class="mb-4">
        <label class="form-label small fw-semibold text-muted text-uppercase" style="letter-spacing:.04em">
          Contraseña
        </label>
        <input type="password" name="password" class="form-control rounded-3"
               placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn btn-eco w-100 fw-bold py-2 rounded-3">
        Ingresar
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="/" class="text-muted small text-decoration-none">← Volver al inicio</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

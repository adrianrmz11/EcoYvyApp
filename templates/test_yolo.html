<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test YOLO + GPS - EcoYvy</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #667eea;
            text-align: center;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #f0f4ff;
            border-color: #764ba2;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        #result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }
        .material-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 5px solid #667eea;
        }
        .material-name {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        .confidence {
            color: #28a745;
            font-weight: bold;
        }
        #preview {
            max-width: 100%;
            max-height: 300px;
            margin: 20px auto;
            display: none;
            border-radius: 10px;
        }
        #map {
            height: 300px;
            margin-top: 20px;
            border-radius: 10px;
            display: none;
        }
        .gps-info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 5px solid #2196F3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Test YOLO + GPS</h1>
        <p style="text-align: center; color: #666;">Subí una imagen y capturá tu ubicación GPS</p>
        
        <div class="gps-info" id="gpsInfo" style="display: none;">
            <strong>📍 Ubicación GPS:</strong><br>
            <span id="gpsCoords">Obteniendo ubicación...</span>
        </div>
        
        <form id="uploadForm">
            <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                <p>📁 Hacé clic para seleccionar una imagen</p>
                <p style="font-size: 12px; color: #999;">(JPG, PNG, WEBP, GIF)</p>
            </div>
            <input type="file" id="imageInput" name="image" accept="image/*" required>
            
            <img id="preview" alt="Preview">
            
            <button type="submit" class="btn" id="submitBtn">
                🔍 Detectar Material y Guardar Ubicación
            </button>
        </form>
        
        <div id="result"></div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const uploadForm = document.getElementById('uploadForm');
        const resultDiv = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');
        const gpsInfo = document.getElementById('gpsInfo');
        const gpsCoords = document.getElementById('gpsCoords');
        const mapDiv = document.getElementById('map');

        let userLatitude = null;
        let userLongitude = null;
        let map = null;
        let marker = null;

        // 1. Capturar GPS al cargar la página
        if (navigator.geolocation) {
            gpsInfo.style.display = 'block';
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    userLatitude = position.coords.latitude;
                    userLongitude = position.coords.longitude;
                    gpsCoords.textContent = `Lat: ${userLatitude.toFixed(6)}, Lng: ${userLongitude.toFixed(6)}`;
                    console.log('GPS capturado:', userLatitude, userLongitude);
                },
                function(error) {
                    gpsCoords.textContent = 'Error al obtener ubicación. Podés continuar sin GPS.';
                    console.error('Error GPS:', error);
                }
            );
        } else {
            gpsInfo.style.display = 'block';
            gpsCoords.textContent = 'Tu navegador no soporta geolocalización.';
        }

        // 2. Mostrar preview de la imagen
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // 3. Enviar formulario con GPS
        uploadForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            
            // Agregar coordenadas GPS si están disponibles
            if (userLatitude && userLongitude) {
                formData.append('latitude', userLatitude);
                formData.append('longitude', userLongitude);
            }
            
            resultDiv.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Analizando...';
            
            try {
                const response = await fetch('/api/detect-material', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    displaySuccess(data);
                } else {
                    displayError(data.error || 'Error desconocido');
                }
            } catch (error) {
                displayError('Error de conexión: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🔍 Detectar Material y Guardar Ubicación';
            }
        });

        function displaySuccess(data) {
            let html = '<h3>✅ Resultados:</h3>';
            html += `<p>Total detectados: <strong>${data.total}</strong></p>`;
            
            if (userLatitude && userLongitude) {
                html += `<p>📍 Ubicación guardada: <strong>Lat ${userLatitude.toFixed(6)}, Lng ${userLongitude.toFixed(6)}</strong></p>`;
            }
            
            if (data.materiales_detectados.length > 0) {
                data.materiales_detectados.forEach((mat, index) => {
                    html += `
                        <div class="material-item">
                            <div class="material-name">${index + 1}. ${mat.material}</div>
                            <div>Clase YOLO: ${mat.clase_yolo}</div>
                            <div class="confidence">Confianza: ${mat.confianza}%</div>
                        </div>
                    `;
                });
            } else {
                html += '<p>No se detectaron materiales de reciclaje</p>';
            }
            
            resultDiv.className = 'success';
            resultDiv.innerHTML = html;
            resultDiv.style.display = 'block';
            
            // Mostrar mapa si hay GPS
            if (userLatitude && userLongitude) {
                displayMap();
            }
        }

        function displayError(message) {
            resultDiv.className = 'error';
            resultDiv.innerHTML = `<h3>❌ Error</h3><p>${message}</p>`;
            resultDiv.style.display = 'block';
        }

        function displayMap() {
            mapDiv.style.display = 'block';
            
            if (!map) {
                map = L.map('map').setView([userLatitude, userLongitude], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);
            }
            
            if (marker) {
                map.removeLayer(marker);
            }
            
            marker = L.marker([userLatitude, userLongitude]).addTo(map);
            marker.bindPopup(`<b>📍 Reporte EcoYvy</b><br>Lat: ${userLatitude.toFixed(6)}<br>Lng: ${userLongitude.toFixed(6)}`).openPopup();
        }
    </script>
</body>
</html>
